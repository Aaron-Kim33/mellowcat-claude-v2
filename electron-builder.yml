appId: com.mellowcat.launcher
productName: MellowCat Claude
directories:
  output: release
artifactName: MellowCat-Claude-${os}-${arch}.${ext}
files:
  - dist/**
  - package.json
afterSign: scripts/notarize.cjs
extraResources:
  - from: mellowcat-vault
    to: mellowcat-vault
  - from: resources/bundled
    to: bundled
publish:
  - provider: github
    owner: Aaron-Kim33
    repo: mellowcat-claude-v2
    releaseType: release
win:
  target:
    - nsis
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  type: distribution
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
