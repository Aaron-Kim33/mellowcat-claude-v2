appId: com.mellowcat.launcher
productName: MellowCat Claude
directories:
  output: release
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
files:
  - dist/**
  - package.json
extraResources:
  - from: mellowcat-vault
    to: mellowcat-vault
  - from: resources/bundled
    to: bundled
publish:
  - provider: github
    owner: Aaron-Kim33
    repo: mellowcat-claude-v2
    releaseType: release
win:
  target:
    - nsis
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
